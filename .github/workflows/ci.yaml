name: Docker

on:
  push:
    branches: [main]
    paths:
      - 'trident/**'
      - 'llmextractinator/**'
      - '.github/workflows/ci.yaml'
  pull_request:
    paths:
      - 'trident/**'
      - 'llmextractinator/**'
      - '.github/workflows/ci.yaml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  OWNER_LC: feida01

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-trident:
    name: Build trident image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build trident image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: trident/Dockerfile
          push: false
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/trident-custom-docker:latest
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/trident-custom-docker:${{ github.sha }}
          cache-from: type=gha,scope=trident
          cache-to: type=gha,mode=max,scope=trident

  push-trident:
    name: Push trident image
    needs: build-trident
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v5

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Push trident image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: trident/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/trident-custom-docker:latest
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/trident-custom-docker:${{ github.sha }}
          cache-from: type=gha,scope=trident
          cache-to: type=gha,mode=max,scope=trident

  build-llmextractinator:
    name: Build llmextractinator image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build llmextractinator image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: llmextractinator/Dockerfile
          push: false
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/llmextractinator-ollama:latest
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/llmextractinator-ollama:${{ github.sha }}
          cache-from: type=gha,scope=llmextractinator
          cache-to: type=gha,mode=max,scope=llmextractinator

  push-llmextractinator:
    name: Push llmextractinator image
    needs: build-llmextractinator
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v5

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Push llmextractinator image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: llmextractinator/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/llmextractinator-ollama:latest
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/llmextractinator-ollama:${{ github.sha }}
          cache-from: type=gha,scope=llmextractinator
          cache-to: type=gha,mode=max,scope=llmextractinator