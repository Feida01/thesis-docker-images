name: CI

on:
  push:
    branches: [main]
    paths:
      - 'trident/**'
      - 'llmextractinator/**'
      - 'trident-cytofm/**'
      - '.github/workflows/ci.yaml'
  pull_request:
    paths:
      - 'trident/**'
      - 'llmextractinator/**'
      - 'trident-cytofm/**'
      - '.github/workflows/ci.yaml'
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  MINIMUM_PYTHON_VERSION: '3.11'
  REGISTRY: ghcr.io
  OWNER_LC: feida01

concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  check-version:
    name: Check latest trident version
    runs-on: ubuntu-latest
    outputs:
      CURRENT_VERSION: ${{ steps.current-version.outputs.CURRENT_VERSION }}
    steps:
      - name: Install Python ${{ env.MINIMUM_PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.MINIMUM_PYTHON_VERSION }}

      - uses: actions/checkout@v5
        with:
          repository: 'mahmoodlab/TRIDENT'

      - name: Get current package version
        id: current-version
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry==1.0.0
          CURRENT_VERSION=$(poetry version | awk '{print $2}')
          echo "CURRENT_VERSION=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"

  build-trident:
    name: Build trident image
    needs: check-version
    runs-on: ubuntu-latest
    env:
      CURRENT_VERSION: ${{ needs.check-version.outputs.CURRENT_VERSION }}
    steps:
      - uses: actions/checkout@v5

      - name: Fail if CURRENT_VERSION is empty
        run: |
          if [ -z "${CURRENT_VERSION}" ]; then
            echo "CURRENT_VERSION not set, aborting build."
            exit 1
          fi

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Build trident image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: trident/Dockerfile
          build-args: |
            trident_version=${{ env.CURRENT_VERSION }}
          push: false
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/trident-custom-docker:latest
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/trident-custom-docker:${{ env.CURRENT_VERSION }}
          cache-from: type=gha,scope=trident
          cache-to: type=gha,mode=max,scope=trident

  push-trident:
    name: Push trident image
    needs:
      - check-version
      - build-trident
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    env:
      CURRENT_VERSION: ${{ needs.check-version.outputs.CURRENT_VERSION }}
    steps:
      - uses: actions/checkout@v5

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Push trident image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: trident/Dockerfile
          build-args: |
            trident_version=${{ env.CURRENT_VERSION }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/trident-custom-docker:latest
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/trident-custom-docker:${{ env.CURRENT_VERSION }}
          cache-from: type=gha,scope=trident
          cache-to: type=gha,mode=max,scope=trident

  build-llmextractinator:
    name: Build llmextractinator image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Build llmextractinator image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: llmextractinator/Dockerfile
          push: false
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/llmextractinator-ollama:latest
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/llmextractinator-ollama:${{ github.sha }}
          cache-from: type=gha,scope=llmextractinator
          cache-to: type=gha,mode=max,scope=llmextractinator

  push-llmextractinator:
    name: Push llmextractinator image
    needs: build-llmextractinator
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@v5

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Push llmextractinator image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: llmextractinator/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/llmextractinator-ollama:latest
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/llmextractinator-ollama:${{ github.sha }}
          cache-from: type=gha,scope=llmextractinator
          cache-to: type=gha,mode=max,scope=llmextractinator
          
  build-trident-cytofm:
    name: Build trident-cytofm image
    needs: check-version
    runs-on: ubuntu-latest
    env:
      CURRENT_VERSION: ${{ needs.check-version.outputs.CURRENT_VERSION }}
    steps:
      - uses: actions/checkout@v5

      - name: Fail if CURRENT_VERSION is empty
        run: |
          if [ -z "${CURRENT_VERSION}" ]; then
            echo "CURRENT_VERSION not set, aborting build."
            exit 1
          fi

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Build trident-cytofm image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: trident-cytofm/Dockerfile
          build-args: |
            trident_version=${{ env.CURRENT_VERSION }}
          push: false
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/trident-cytofm:latest
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/trident-cytofm:${{ env.CURRENT_VERSION }}
          cache-from: type=gha,scope=trident-cytofm
          cache-to: type=gha,mode=max,scope=trident-cytofm

  push-trident-cytofm:
    name: Push trident-cytofm image
    needs:
      - check-version
      - build-trident-cytofm
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    env:
      CURRENT_VERSION: ${{ needs.check-version.outputs.CURRENT_VERSION }}
    steps:
      - uses: actions/checkout@v5

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Push trident-cytofm image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: trident-cytofm/Dockerfile
          build-args: |
            trident_version=${{ env.CURRENT_VERSION }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/trident-cytofm:latest
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/trident-cytofm:${{ env.CURRENT_VERSION }}
          cache-from: type=gha,scope=trident-cytofm
          cache-to: type=gha,mode=max,scope=trident-cytofm